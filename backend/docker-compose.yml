services:
  postgres:
    image: postgres:16
    container_name: job-application-tracker-postgres
    environment:
      POSTGRES_DB: job_application_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
